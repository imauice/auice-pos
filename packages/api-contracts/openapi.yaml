openapi: 3.0.3
info: { title: Auice POS Cloud API, version: 0.2.0 }
servers: [{ url: /api }]
paths:
  /health:
    get: { responses: { '200': { description: Service and database health } } }
  /sync/push:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SyncPushRequest' }
      responses: { '201': { description: Deterministic per-event sync results } }
components:
  schemas:
    Product:
      type: object
      required: [id, branchId, name, trackStock, baseQuantityScale, active]
      properties:
        id: { type: string, format: uuid }
        branchId: { type: string, format: uuid }
        name: { type: string }
        baseUnitId: { type: string, format: uuid, nullable: true }
        trackStock: { type: boolean }
        baseQuantityScale: { type: integer, minimum: 1, default: 1, description: Canonical scale used by every base-unit quantity for this product. }
        active: { type: boolean }
    SyncEvent:
      type: object
      required: [id, entityType, entityId, operation, entityVersion, occurredAt, payload]
      properties:
        id: { type: string, format: uuid }
        entityType: { type: string, description: Service validates supported values per event so mixed batches can be partially accepted. }
        entityId: { type: string, format: uuid }
        operation: { type: string, enum: [create, update, delete, append] }
        entityVersion: { type: integer, minimum: 1 }
        occurredAt: { type: string, format: date-time }
        payload: { type: object }
    SyncPushRequest:
      type: object
      required: [protocolVersion, branchId, deviceId, events]
      properties:
        protocolVersion: { type: integer, enum: [1] }
        branchId: { type: string, format: uuid }
        deviceId: { type: string, format: uuid }
        events: { type: array, minItems: 1, maxItems: 100, items: { $ref: '#/components/schemas/SyncEvent' } }
